<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080B" />
    <meta name="description" content="Cortex — long-term memory for AI agents. Connect Cursor, Claude Desktop, Cline and more through MCP." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Cortex — long-term memory for AI agents</title>
  </head>
  <body>
    <div id="root"></div>
<script>
// Inline health check — runs before React
fetch('/admin/health', { headers: { Authorization: 'Bearer ' + (localStorage.getItem('admin_token')||localStorage.getItem('mos_admin_token')||'') } })
  .then(r => r.json()).then(d => {
    const s = d.services || {};
    window.__HEALTH = s;
    document.title = Object.values(s).every(v=>v) ? '✅ ALL OK' : '⚠️ ' + Object.values(s).filter(v=>!v).length + ' DOWN';
  }).catch(() => { document.title = '❌ API DOWN'; });
</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Memory OS | 首次运行配置向导</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #05070a;
            --bg-surface: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.8);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #2f81f7;
            --accent-green: #238636;
            --blur: blur(20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
        }

        .wizard-container {
            width: 500px;
            background: var(--bg-surface);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 10px; text-align: center; }
        p.subtitle { color: var(--text-secondary); text-align: center; margin-bottom: 30px; font-size: 0.95rem; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-secondary); }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(47,129,247,0.2); }

        .btn-group { display: flex; gap: 12px; margin-top: 30px; }
        button {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        button.primary { background: var(--accent-blue); color: #fff; border: none; }
        button.primary:hover { filter: brightness(1.1); }
        button.secondary { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        button.secondary:hover { background: rgba(255,255,255,0.05); }

        .progress-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-color); transition: 0.3s; }
        .dot.active { background: var(--accent-blue); width: 24px; border-radius: 4px; }

        .provider-choice {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .p-card {
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .p-card:hover { background: rgba(255,255,255,0.05); }
        .p-card.selected { border-color: var(--accent-blue); background: rgba(47,129,247,0.1); }
        .p-card img { height: 30px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="wizard-container">
        <div class="progress-dots">
            <div class="dot active" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
        </div>

        <!-- Step 1: Admin Credentials -->
        <div class="step active" id="step-1">
            <h1>欢迎使用 Memory OS</h1>
            <p class="subtitle">首先，请为您的管理员账户设置安全凭据。</p>
            
            <div class="form-group">
                <label>管理员用户名</label>
                <input type="text" id="setup-user" value="admin" readonly>
            </div>
            <div class="form-group">
                <label>设置登录密码</label>
                <input type="password" id="setup-pwd" placeholder="建议包含字母与数字" autofocus>
            </div>
            
            <div class="btn-group">
                <button class="primary" onclick="nextStep(2)">下一步：配置算力</button>
            </div>
        </div>

        <!-- Step 2: Provider Selection -->
        <div class="step" id="step-2">
            <h1>选择算力供应源</h1>
            <p class="subtitle">推荐使用阿里云 DashScope，价格极低且无需科学上网。</p>
            
            <div class="provider-choice">
                <div class="p-card selected" onclick="selectProvider('alibaba', this)">
                    <div style="font-weight:600; margin-bottom:5px;">阿里云</div>
                    <div style="font-size:0.75rem; color:var(--text-secondary)">通义千问 / DashScope</div>
                </div>
                <div class="p-card" onclick="selectProvider('openai', this)">
                    <div style="font-weight:600; margin-bottom:5px;">OpenAI</div>
                    <div style="font-size:0.75rem; color:var(--text-secondary)">GPT-4o / v1 接口</div>
                </div>
            </div>

            <div class="form-group">
                <label id="key-label">阿里云 API KEY (DashScope)</label>
                <input type="password" id="setup-key" placeholder="sk-...">
                <p style="font-size:0.75rem; color:var(--text-secondary); margin-top:8px;">
                    还没有 Key？ <a href="https://dashscope.console.aliyun.com/" target="_blank" style="color:var(--accent-blue)">前往阿里云获取</a>
                </p>
            </div>

            <div class="btn-group">
                <button class="secondary" onclick="nextStep(1)">上一步</button>
                <button class="primary" onclick="nextStep(3)">下一步：环境检测</button>
            </div>
        </div>

        <!-- Step 3: Final Review -->
        <div class="step" id="step-3">
            <h1>即将准备就绪</h1>
            <p class="subtitle">系统将自动初始化向量数据库并下载基础嵌入模型。</p>
            
            <div style="background:rgba(0,0,0,0.2); border-radius:12px; padding:20px; font-size:0.9rem; line-height:1.6;">
                <div style="display:flex; justify-content:space-between"><span>部署模式</span><span style="color:var(--accent-green)">混合云模式 (Recommended)</span></div>
                <div style="display:flex; justify-content:space-between"><span>知识库引擎</span><span style="color:var(--text-secondary)">Qdrant / PG-Vector</span></div>
                <div style="display:flex; justify-content:space-between"><span>推理引擎</span><span id="review-provider" style="color:var(--text-secondary)">Alibaba</span></div>
            </div>

            <div class="btn-group">
                <button class="secondary" onclick="nextStep(2)">上一步</button>
                <button class="primary" onclick="finishSetup()">完成配置并启动系统</button>
            </div>
        </div>
    </div>

    <script>
        let selectedProvider = 'alibaba';

        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${n}`).classList.add('active');
            
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${n}`).classList.add('active');

            if (n === 3) {
                document.getElementById('review-provider').textContent = selectedProvider === 'alibaba' ? 'Alibaba DashScope' : 'OpenAI';
            }
        }

        function selectProvider(p, el) {
            selectedProvider = p;
            document.querySelectorAll('.p-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('key-label').textContent = p === 'alibaba' ? '阿里云 API KEY (DashScope)' : 'OpenAI API KEY (sk-...)';
        }

        async function finishSetup() {
            const pwd = document.getElementById('setup-pwd').value.trim();
            const key = document.getElementById('setup-key').value.trim();

            if (!pwd || !key) {
                alert('请确保已填写密码和 API Key');
                return;
            }

            const btn = document.querySelector('#step-3 .primary');
            btn.disabled = true;
            btn.textContent = '正在初始化系统...';

            try {
                const res = await fetch('/admin/setup/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_password: pwd,
                        provider: selectedProvider,
                        api_key: key
                    })
                });
                
                if (!res.ok) throw new Error(await res.text());

                // Auto-login with the new credentials to get the admin token
                try {
                    const loginRes = await fetch('/admin/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: 'admin', password: pwd })
                    });
                    if (loginRes.ok) {
                        const loginData = await loginRes.json();
                        localStorage.setItem('mos_admin_token', loginData.api_key);
                    }
                } catch(e) { /* non-fatal */ }

                alert('系统初始化成功！点击确定进入控制台。');
                window.location.href = '/manage/';
            } catch (e) {
                alert('初始化失败: ' + e.message);
                btn.disabled = false;
                btn.textContent = '完成配置并启动系统';
            }
        }
    </script>
</body>
</html>

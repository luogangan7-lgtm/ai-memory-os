<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Memory OS — Neural Void V6.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --bg-void:      #040810;
      --bg-surface:   rgba(10, 18, 36, 0.75);
      --bg-elevated:  rgba(16, 26, 50, 0.85);
      --teal:         #00f0d4;
      --violet:       #9d50ff;
      --amber:        #ffb347;
      --emerald:      #00e676;
      --crimson:      #ff4d6d;
      --text:         #e4eeff;
      --muted:        #6a7fa8;
      --border:       rgba(40, 65, 110, 0.5);
      --font:         'Syne', sans-serif;
      --mono:         'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg-void); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    #neural-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8; }
    
    .layer { position: relative; z-index: 1; }
    .hidden { display: none !important; }

    /* ═══════════════════════════════════════════════
       AUTH SCENE
    ═══════════════════════════════════════════════ */
    .auth-scene {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      perspective: 1500px; overflow: hidden;
    }
    .auth-backdrop {
      position: absolute; width: 120%; height: 120%;
      background: radial-gradient(circle at center, rgba(157, 80, 255, 0.1), transparent 60%);
    }
    .flip-card-wrapper { width: 420px; height: 560px; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .flip-card { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 32px;
      backdrop-filter: blur(40px); padding: 48px; display: flex; flex-direction: column;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }
    .flip-back { transform: rotateY(180deg); }

    .auth-logo { text-align: center; margin-bottom: 40px; }
    .auth-logo-icon { font-size: 50px; margin-bottom: 12px; filter: drop-shadow(0 0 10px var(--teal)); }
    .auth-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--muted); font-weight: 500; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 18px; color: #fff; font-family: var(--font); font-size: 15px; outline: none; transition: all 0.3s;
    }
    input:focus { border-color: var(--teal); background: rgba(0,240,212,0.03); box-shadow: 0 0 0 4px rgba(0,240,212,0.08); }
    
    .auth-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none; font-family: var(--font); font-weight: 700;
      font-size: 16px; cursor: pointer; transition: all 0.3s; margin-top: 10px;
      background: linear-gradient(135deg, var(--teal), #00c8b0); color: #040810;
      box-shadow: 0 10px 30px rgba(0,240,212,0.3);
    }
    .auth-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,240,212,0.45); }
    
    .auth-switch { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); cursor: pointer; }
    .auth-switch span { color: var(--teal); font-weight: 700; }

    /* ═══════════════════════════════════════════════
       APP MAIN
    ═══════════════════════════════════════════════ */
    .app { display: none; height: 100vh; flex-direction: column; }
    .app.active { display: flex; }
    
    .topbar {
      height: 72px; padding: 0 32px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); background: rgba(4,8,16,0.4);
    }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 18px; }
    .logo-icon { font-size: 24px; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--violet); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .user-name { font-size: 14px; font-weight: 700; }
    .user-team { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 12px; }

    .app-layout { flex: 1; display: flex; overflow: hidden; }
    .app-sidebar {
      width: 240px; border-right: 1px solid var(--border); padding: 24px 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
      cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); transition: all 0.2s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(0,240,212,0.1); color: var(--teal); border: 1px solid rgba(0,240,212,0.2); }
    .nav-icon { font-size: 18px; }

    .app-main { flex: 1; overflow-y: auto; padding: 40px; }
    .panel { display: none; animation: panel-fade 0.3s ease-out; }
    .panel.active { display: block; }
    @keyframes panel-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .panel-header { margin-bottom: 32px; display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .panel-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* ── Chat System ── */
    .chat-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; height: calc(100vh - 200px); }
    .chat-main { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .chat-messages-area { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
    .msg-bubble { max-width: 80%; padding: 16px 20px; border-radius: 20px; font-size: 15px; line-height: 1.6; position: relative; }
    .msg-bubble.user { align-self: flex-end; background: var(--violet); color: #fff; border-bottom-right-radius: 4px; }
    .msg-bubble.ai { align-self: flex-start; background: var(--bg-elevated); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .chat-input-row { padding: 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: rgba(4,8,16,0.3); }
    .chat-textarea { flex: 1; background: transparent; border: none; color: #fff; font-family: var(--font); font-size: 15px; resize: none; outline: none; height: 44px; line-height: 24px; }

    /* ── Components ── */
    .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 24px; backdrop-filter: blur(20px); }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 700; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, var(--teal), #00c8b0); color: #040810; }
    .btn-violet { background: linear-gradient(135deg, var(--violet), #7a30dd); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* ── Memory Grid ── */
    .memory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .memory-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 18px; padding: 20px; transition: all 0.3s; cursor: default; }
    .memory-card:hover { transform: translateY(-5px); border-color: var(--teal); }
    .memory-card-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--teal); }
    .memory-card-preview { font-size: 13px; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 24px; padding: 60px; text-align: center;
      transition: all 0.3s; cursor: pointer; background: rgba(255,255,255,0.02);
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--teal); background: rgba(0,240,212,0.05); }
    .upload-zone-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.6; }
    .upload-zone-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .upload-zone-sub { font-size: 14px; color: var(--muted); }
    #upload-input { display: none; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; font-size: 13px; backdrop-filter: blur(20px); animation: slide-in 0.3s ease; }
    @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast.ok { border-color: var(--emerald); }
    .toast.err { border-color: var(--crimson); }
  </style>
</head>
<body>

<canvas id="neural-bg"></canvas>

<!-- 登录界面 -->
<div class="auth-scene" id="auth-scene">
  <div class="auth-backdrop"></div>
  <div class="flip-card-wrapper">
    <div class="flip-card" id="flip-card">
      <div class="flip-front">
        <div class="auth-logo">
          <div class="auth-logo-icon">🧠</div>
          <div class="auth-title">AI Memory OS</div>
          <div class="auth-sub">私有知识记忆中枢 V6.0</div>
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="login-username" placeholder="Username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Team ID</label>
          <input type="text" id="login-team" placeholder="default">
        </div>
        <button class="auth-btn" onclick="doAuth()">进入空间</button>
        <div class="auth-switch" onclick="flipCard()">没有账户？<span>立即注册 →</span></div>
      </div>
      <div class="flip-back">
        <div class="auth-logo">
          <div class="auth-logo-icon">✨</div>
          <div class="auth-title">创建账户</div>
        </div>
        <div class="form-group"><label>用户名</label><input type="text" id="reg-username"></div>
        <div class="form-group"><label>密码</label><input type="password" id="reg-password"></div>
        <div class="form-group"><label>Team ID</label><input type="text" id="reg-team" placeholder="my-team"></div>
        <button class="auth-btn" onclick="doRegister()">创建账户</button>
        <div class="auth-switch" onclick="flipCard()">← <span>返回登录</span></div>
      </div>
    </div>
  </div>
</div>

<!-- 主界面 -->
<div class="app" id="main-app">
  <div class="topbar">
    <div class="logo"><div class="logo-icon">🧠</div> AI Memory OS</div>
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">U</div>
      <div>
        <div class="user-name" id="user-name-display">User</div>
        <div class="user-team" id="user-team-display">team: —</div>
      </div>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="app-layout">
    <nav class="app-sidebar">
      <a class="nav-item active" onclick="showPanel('chat')"><span class="nav-icon">💬</span> AI 对话</a>
      <a class="nav-item" onclick="showPanel('memories')"><span class="nav-icon">🧠</span> 记忆库</a>
      <a class="nav-item" onclick="showPanel('upload')"><span class="nav-icon">📁</span> 文档上传</a>
      <a class="nav-item" onclick="showPanel('connect')"><span class="nav-icon">🔗</span> 接入向导</a>
    </nav>

    <main class="app-main">
      <div class="panel active" id="panel-chat">
        <div class="panel-header">
          <div class="panel-title">💬 AI 对话</div>
        </div>
        <div class="chat-layout">
          <div class="chat-main">
            <div class="chat-header"><span id="chat-status">记忆已就绪</span></div>
            <div class="chat-messages-area" id="chat-messages"></div>
            <div class="chat-input-row">
              <textarea class="chat-textarea" id="chat-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
              <button class="btn btn-violet" onclick="sendMessage()">发送</button>
            </div>
          </div>
          <div class="chat-sidebar">
             <div class="card"><div class="card-title">🔮 记忆增强</div><div id="mem-context-list" style="font-size:12px;color:var(--muted);">发送消息以查看检索到的背景...</div></div>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-memories">
        <div class="panel-header">
          <div class="panel-title">🧠 记忆库</div>
          <input type="text" placeholder="搜索记忆..." style="width:240px;" oninput="loadMemories(this.value)">
        </div>
        <div class="memory-grid" id="memory-grid"></div>
      </div>

      <div class="panel" id="panel-upload">
        <div class="panel-header"><div class="panel-title">📁 文档上传</div></div>
        <div class="upload-zone" onclick="document.getElementById('upload-input').click()">
          <div class="upload-zone-icon">📄</div>
          <div class="upload-zone-title">点击或拖拽上传文档</div>
          <div class="upload-zone-sub">PDF, Markdown, TXT (自动向量化)</div>
        </div>
        <input type="file" id="upload-input" multiple onchange="handleFiles(this.files)">
        <div id="upload-queue" style="margin-top:20px;"></div>
      </div>

      <div class="panel" id="panel-connect">
        <div class="panel-header"><div class="panel-title">🔗 接入向导</div></div>
        <div class="card">
          <div class="card-title">🔑 API Token</div>
          <div style="font-family:var(--mono);background:rgba(0,0,0,0.3);padding:12px;border-radius:10px;color:var(--teal);" id="token-display">••••••••</div>
          <button class="btn btn-ghost btn-sm" style="margin-top:10px;" onclick="copyToken()">复制 Token</button>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
let AUTH_TOKEN = localStorage.getItem('mos_token');
let USERNAME = localStorage.getItem('mos_username');
let TEAM_ID = localStorage.getItem('mos_team');

function flipCard() { document.getElementById('flip-card').classList.toggle('flipped'); }

async function doAuth() {
  const u = document.getElementById('login-username').value;
  const p = document.getElementById('login-password').value;
  const t = document.getElementById('login-team').value || 'default';
  try {
    const r = await fetch('/admin/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
    const d = await r.json();
    if(r.ok) { saveAuth(d.api_key, u, d.team_id || t); }
    else { alert('登录失败'); }
  } catch(e) { alert('连接错误'); }
}

async function doRegister() {
  const u = document.getElementById('reg-username').value;
  const p = document.getElementById('reg-password').value;
  const t = document.getElementById('reg-team').value || 'default';
  try {
    const r = await fetch('/admin/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p, team_id:t}) });
    const d = await r.json();
    if(r.ok) { saveAuth(d.api_key, u, t); }
    else { alert('注册失败'); }
  } catch(e) { alert('连接错误'); }
}

function saveAuth(token, u, t) {
  AUTH_TOKEN = token; USERNAME = u; TEAM_ID = t;
  localStorage.setItem('mos_token', token);
  localStorage.setItem('mos_username', u);
  localStorage.setItem('mos_team', t);
  location.reload();
}

function logout() { localStorage.clear(); location.reload(); }

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  if(name === 'memories') loadMemories();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  appendMsg('user', msg);
  const aiBubble = appendMsg('ai', '...');
  try {
    const r = await fetch('/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${AUTH_TOKEN}`},
      body:JSON.stringify({ messages:[{role:'user', content:msg}], stream:true })
    });
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = decoder.decode(value);
      chunk.split('\n').forEach(line => {
        if(line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            text += data.choices[0].delta.content || '';
            aiBubble.textContent = text;
          } catch(e) {}
        }
      });
    }
  } catch(e) { aiBubble.textContent = 'Error: ' + e.message; }
}

function appendMsg(role, content) {
  const area = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg-bubble ${role}`;
  div.textContent = content;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

async function loadMemories(query='') {
  const grid = document.getElementById('memory-grid');
  try {
    const url = query ? `/memory/search` : `/memory/recent?limit=20`;
    const opts = query ? {method:'POST', body:JSON.stringify({query}), headers:{'Content-Type':'application/json','Authorization':`Bearer ${AUTH_TOKEN}`}} : {headers:{'Authorization':`Bearer ${AUTH_TOKEN}`}};
    const r = await fetch(url, opts);
    const d = await r.json();
    const list = d.memories || d.results || d || [];
    grid.innerHTML = list.map(m => `
      <div class="memory-card">
        <div class="memory-card-title">${m.title || 'Untitled'}</div>
        <div class="memory-card-preview">${m.content}</div>
      </div>
    `).join('');
  } catch(e) {}
}

if(AUTH_TOKEN) {
  document.getElementById('auth-scene').classList.add('hidden');
  document.getElementById('main-app').classList.add('active');
  document.getElementById('user-name-display').textContent = USERNAME;
  document.getElementById('user-team-display').textContent = `team: ${TEAM_ID}`;
  document.getElementById('token-display').textContent = AUTH_TOKEN;
  loadMemories();
}

// Particle Background
(function() {
  const canvas = document.getElementById('neural-bg');
  const renderer = new THREE.WebGLRenderer({canvas, alpha:true});
  renderer.setSize(innerWidth, innerHeight);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 5;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(500 * 3);
  for(let i=0; i<500*3; i++) pos[i] = (Math.random()-0.5)*10;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({color: 0x00f0d4, size: 0.05});
  const points = new THREE.Points(geo, mat);
  scene.add(points);
  function animate() { requestAnimationFrame(animate); points.rotation.y += 0.001; renderer.render(scene, camera); }
  animate();
})();
</script>
</body>
</html>

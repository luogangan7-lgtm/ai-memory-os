name: Release AI Memory OS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Backend)
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Backend
        run: |
          cd backend
          pyinstaller --onefile --name memory-os-backend main.py
          mkdir -p ../desktop/bin
          cp dist/memory-os-backend* ../desktop/bin/

      - name: Install dependencies (Desktop)
        run: |
          cd desktop
          npm install

      - name: Build and Release Desktop App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd desktop
          npx electron-builder --publish always

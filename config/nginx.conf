# AI Memory OS - Nginx Reverse Proxy (Production & Test)

# Rate limit zone (must be in http context, typically included from here)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

# HTTP to HTTPS redirect for all domains
server {
    listen 80;
    server_name admin.your-domain.com app.your-domain.com test-admin.your-domain.com test-app.your-domain.com;
    return 301 https://$host$request_uri;
}

# ----------------------------------------------------
# 1. Production Admin
# ----------------------------------------------------
server {
    listen 443 ssl http2;
    server_name admin.your-domain.com;

    # 请替换为您实际的证书路径
    ssl_certificate     /etc/letsencrypt/live/admin.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.your-domain.com/privkey.pem;

    limit_req zone=api burst=20 nodelay;
    client_max_body_size 50m;
    
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
    }

    location /metrics {
        allow 127.0.0.1;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
    }
}

# ----------------------------------------------------
# 2. Production User
# ----------------------------------------------------
server {
    listen 443 ssl http2;
    server_name app.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/app.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.your-domain.com/privkey.pem;

    limit_req zone=api burst=20 nodelay;
    client_max_body_size 50m;
    
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ----------------------------------------------------
# 3. Test Admin
# ----------------------------------------------------
server {
    listen 443 ssl http2;
    server_name test-admin.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/test-admin.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test-admin.your-domain.com/privkey.pem;

    client_max_body_size 50m;

    location / {
        # 代理到测试环境的端口 8010
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}


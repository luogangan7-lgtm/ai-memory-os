# AI Memory OS - Nginx Reverse Proxy (Production)
server {
    listen 80;
    server_name memory-os.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name memory-os.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/memory-os.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memory-os.your-domain.com/privkey.pem;

    # Rate limit: 100 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req zone=api burst=20 nodelay;

    # Body size limit: 50MB (PDF upload)
    client_max_body_size 50m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
    }

    # Prometheus metrics (internal only)
    location /metrics {
        allow 127.0.0.1;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    # Grafana dashboard
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
    }
}

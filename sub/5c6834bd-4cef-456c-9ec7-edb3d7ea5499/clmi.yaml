port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
dns:
  enable: true 
  listen: "0.0.0.0:1053"
  ipv6: true
  prefer-h3: false
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: "arc"
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  default-nameserver: ["223.5.5.5", "119.29.29.29"]
  nameserver:
    - "https://1.1.1.1/dns-query"
    - "https://8.8.8.8/dns-query"
  proxy-server-nameserver:
    - "https://223.5.5.5/dns-query"
    - "https://doh.pub/dns-query"
nameserver-policy:
  "geosite:cn":
     - "https://223.5.5.5/dns-query"
     - "https://doh.pub/dns-query"

proxies:
- name: vless-reality-vision-server-aasg9i-ugy               
  type: vless
  server: 176.97.192.184                           
  port: 57014                                
  uuid: 5c6834bd-4cef-456c-9ec7-edb3d7ea5499   
  network: tcp
  udp: true
  tls: true
  flow: xtls-rprx-vision
  servername: apple.com                 
  reality-opts: 
    public-key: vwDkX60EJzOq6Yh6AfENLmzR9FLBfPR8PPNSGxGBmRQ    
    short-id: 42f1e7c1                      
  client-fingerprint: chrome                  

- name: vmess-ws-server-aasg9i-ugy                         
  type: vmess
  server:                         
  port: 2052                                     
  uuid: 5c6834bd-4cef-456c-9ec7-edb3d7ea5499       
  alterId: 0
  cipher: auto
  udp: true
  tls: false
  network: ws
  servername: www.visa.com.sg                    
  ws-opts:
    path: "5c6834bd-4cef-456c-9ec7-edb3d7ea5499-vm"                             
    headers:
      Host: www.visa.com.sg                     

- name: hysteria2-server-aasg9i-ugy                            
  type: hysteria2                                      
  server: 176.97.192.184                               
  port: 10637
  ports: 
  password: 5c6834bd-4cef-456c-9ec7-edb3d7ea5499                          
  alpn:
    - h3
  sni: www.bing.com                               
  skip-cert-verify: true
  fast-open: true

- name: tuic5-server-aasg9i-ugy                            
  server: 176.97.192.184                      
  port: 15555                                    
  type: tuic
  uuid: 5c6834bd-4cef-456c-9ec7-edb3d7ea5499       
  password: 5c6834bd-4cef-456c-9ec7-edb3d7ea5499   
  alpn: [h3]
  disable-sni: true
  reduce-rtt: true
  udp-relay-mode: native
  congestion-controller: bbr
  sni: www.bing.com                                
  skip-cert-verify: true

- name: anytls-server-aasg9i-ugy
  type: anytls
  server: 176.97.192.184
  port: 61778
  password: 5c6834bd-4cef-456c-9ec7-edb3d7ea5499
  client-fingerprint: chrome
  udp: true
  idle-session-check-interval: 30
  idle-session-timeout: 30
  sni: www.bing.com
  skip-cert-verify: true

proxy-groups:
- name: 负载均衡
  type: load-balance
  url: https://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
  proxies:
    - vless-reality-vision-server-aasg9i-ugy                              
    - vmess-ws-server-aasg9i-ugy
    - hysteria2-server-aasg9i-ugy
    - tuic5-server-aasg9i-ugy
    - anytls-server-aasg9i-ugy

- name: 自动选择
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
    - vless-reality-vision-server-aasg9i-ugy                              
    - vmess-ws-server-aasg9i-ugy
    - hysteria2-server-aasg9i-ugy
    - tuic5-server-aasg9i-ugy
    - anytls-server-aasg9i-ugy
    
- name: 🌍选择代理节点
  type: select
  proxies:
    - 负载均衡                                         
    - 自动选择
    - DIRECT
    - vless-reality-vision-server-aasg9i-ugy                              
    - vmess-ws-server-aasg9i-ugy
    - hysteria2-server-aasg9i-ugy
    - tuic5-server-aasg9i-ugy
    - anytls-server-aasg9i-ugy
rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
